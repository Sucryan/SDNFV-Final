frr defaults datacenter
fpm connection ip 172.17.0.2 port 2620

! ===== prefix-list =====
ip prefix-list TO-TA-V4 seq 10 permit 172.16.13.0/24
ip prefix-list TO-TA-V4 seq 20 permit 172.17.13.0/24
ipv6 prefix-list TO-TA-V6 seq 10 permit 2a0b:4e07:c4:13::/64
ipv6 prefix-list TO-TA-V6 seq 20 permit 2a0b:4e07:c4:113::/64

! ===== route-map =====
route-map TO-TA-V4 permit 10
  match ip address prefix-list TO-TA-V4
route-map TO-TA-V4 deny 100

route-map TO-TA-V6 permit 10
  match ipv6 address prefix-list TO-TA-V6
route-map TO-TA-V6 deny 100

ip community-list standard R2-PEER permit 65000:17

route-map PEER-IN permit 10
  match community R2-PEER
  set local-preference 50

route-map PEER-IN permit 20
  set local-preference 200
  
router bgp 65130
bgp router-id 192.168.70.13
timers bgp 3 9

neighbor PEER peer-group
neighbor PEER ebgp-multihop
neighbor PEER timers connect 5
neighbor PEER advertisement-interval 5

neighbor 192.168.70.253 remote-as 65000
neighbor 192.168.70.253 peer-group PEER
neighbor 192.168.70.253 password winlab.nycu

neighbor fd70::fe remote-as 65000
neighbor fd70::fe peer-group PEER
neighbor fd70::fe password winlab.nycu

neighbor 192.168.63.2 remote-as 65131
neighbor 192.168.63.2 peer-group PEER

neighbor fd63::2 remote-as 65131
neighbor fd63::2 peer-group PEER

neighbor 192.168.70.14 remote-as 65140
neighbor 192.168.70.14 peer-group PEER

neighbor fd70::14 remote-as 65140
neighbor fd70::14 peer-group PEER

neighbor 192.168.70.15 remote-as 65150
neighbor 192.168.70.15 peer-group PEER

neighbor fd70::15 remote-as 65150
neighbor fd70::15 peer-group PEER

address-family ipv4 unicast
  network 172.16.13.0/24
  neighbor 192.168.63.2 activate
  neighbor 192.168.70.14 activate
  neighbor 192.168.70.14 route-map PEER-IN in
  neighbor 192.168.70.15 activate
  neighbor 192.168.70.15 route-map PEER-IN in
  neighbor 192.168.70.253 activate
  neighbor 192.168.70.253 route-map TO-TA-V4 out
  no neighbor fd63::2 activate
  no neighbor fd70::fe activate
exit-address-family
!
address-family ipv6 unicast
  network 2a0b:4e07:c4:13::/64
  neighbor fd63::2 activate
  neighbor fd70::14 activate
  neighbor fd70::14 route-map PEER-IN in
  neighbor fd70::15 activate
  neighbor fd70::15 route-map PEER-IN in
  neighbor fd70::fe activate
  neighbor fd70::fe route-map TO-TA-V6 out
  no neighbor 192.168.63.2 activate
  no neighbor 192.168.70.253 activate
exit-address-family
!
log stdout


