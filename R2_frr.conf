! R2 Configuration (AS 65131, Peer to 65130)
!
frr defaults datacenter
!
! FPM connection to ONOS
fpm connection ip 172.17.0.2 port 2620
!

route-map TAG-R2 permit 10
  set community 65000:17 additive

router bgp 65131
 bgp router-id 192.168.63.2
 timers bgp 3 9
 !
 neighbor PEER peer-group
 neighbor PEER ebgp-multihop
 neighbor PEER timers connect 5
 neighbor PEER advertisement-interval 5
 !
 ! Peer to FRRouting (AS 65130)
 neighbor 192.168.63.1 remote-as 65130
 neighbor 192.168.63.1 peer-group PEER
 !
 neighbor fd63::1 remote-as 65130
 neighbor fd63::1 peer-group PEER
 
 address-family ipv4 unicast
  network 172.17.13.0/24 
  neighbor 192.168.63.1 activate
  neighbor 192.168.63.1 route-map TAG-R2 out
 exit-address-family
 !
 address-family ipv6 unicast
  network 2a0b:4e07:c4:113::/64
  neighbor fd63::1 activate
  neighbor fd63::1 route-map TAG-R2 out
 exit-address-family
!
log stdout
